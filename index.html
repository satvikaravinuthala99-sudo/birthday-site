<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Anna ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BACKGROUND MUSIC -->
<audio id="bgMusic" loop autoplay muted>
  <source src="assets/music/song.mp3" type="audio/mp3">
</audio>

<div class="container">

<h1 class="title">🎉 Happy Birthday Anna 💙</h1>

<div class="card">
  <p id="typing"></p>
</div>

<!-- PHOTO -->
<div class="photo-container">
  <img src="assets/images/bro1.jpg" class="main-photo">
</div>

<!-- BUTTON -->
<button class="btn" onclick="showVideo()">🎁 Tap for Surprise</button>

<!-- VIDEO -->
<div class="video-container" id="videoBox">
  <video id="videoMessage" controls>
    <source src="assets/video/message.mp4" type="video/mp4">
  </video>
</div>

</div>

<!-- BUBBLES -->
<div class="bubbles"></div>

<script src="script.js"></script>

</body>
</html>
